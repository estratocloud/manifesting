name: release

on:
  push:
    tags: ["v*.*.*"]

run-name: Release ${{ github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Create binary
        shell: bash
        run: |
          docker build . --target=dev -t manifesting-image
          docker run --interactive --detach --volume ${{ github.workspace }}:/app \
            --env GOOS="${{ matrix.os }}" \
            --env GOARCH="${{ matrix.arch }}" \
            --env CGO_ENABLED="0" \
            --name manifesting manifesting-image

          BINARY_NAME=manifesting-${{ matrix.os }}-${{ matrix.arch }}
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          docker exec manifesting \
            go build \
            --ldflags="-s -w -X github.com/estratocloud/manifesting/manifesting.Version=${{ github.ref_name }}" \
            --trimpath \
            -o "bin/${BINARY_NAME}" \
            .

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: manifesting-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/*

  docker-images:
    name: Create Docker Images
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Authorise with Docker Hub
        uses: docker/login-action@v4
        with:
          username: estratocloud
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: manifesting-linux-${{ matrix.arch }}

      - name: Create Docker Image
        run: |
          docker buildx build . --push \
            --platform linux/${{ matrix.arch }} \
            --target=production \
            --build-arg BIN=manifesting-linux-${{ matrix.arch }} \
            -t estratocloud/manifesting:${{ github.ref_name }}-${{ matrix.arch }}

  docker-manifest:
    name: Create Docker Manifest
    needs: docker-images
    runs-on: ubuntu-latest

    steps:
      - name: Authorise with Docker Hub
        uses: docker/login-action@v4
        with:
          username: estratocloud
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Create the Manifest
        run: |
          docker buildx imagetools create \
            -t estratocloud/manifesting:${{ github.ref_name }} \
            estratocloud/manifesting:${{ github.ref_name }}-amd64 \
            estratocloud/manifesting:${{ github.ref_name }}-arm64

      - name: Override the 'latest' docker tag
        run: |
          docker buildx imagetools create \
            -t estratocloud/manifesting:latest \
            estratocloud/manifesting:${{ github.ref_name }}-amd64 \
            estratocloud/manifesting:${{ github.ref_name }}-arm64

  create-release:
    name: Create GitHub Release
    needs: [build, docker-manifest]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: manifesting-*
          merge-multiple: true
          path: bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 #v3.0.2
        with:
          files: bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
