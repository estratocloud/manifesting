apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    scale-maximum: "1"
    scale-messages-per-pod: "1000"
    scale-minimum: "1"
  labels:
    app: myapp-scheduler
    type: daemon
  name: myapp-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp-scheduler
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 50%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: myapp-scheduler
        azure.workload.identity/use: "true"
      name: myapp-scheduler
    spec:
      containers:
      - command:
        - /app/bin/scheduler.php
        env:
        - name: ALLOW_EXTERNAL_RESOURCES
          value: "true"
        - name: ATTRIBUTE_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              key: attributes
              name: myapp
        - name: CACHE_SETTINGS
          valueFrom:
            secretKeyRef:
              key: cache
              name: azure
        - name: DATABASE_NAME
          valueFrom:
            secretKeyRef:
              key: name
              name: database
        - name: DATABASE_HOSTNAME
          valueFrom:
            secretKeyRef:
              key: host
              name: database
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              key: username
              name: database
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: database
        - name: DOCUMENT_STORAGE_SETTINGS
          valueFrom:
            secretKeyRef:
              key: storage
              name: documentstore
        - name: EMAIL_SETTINGS
          valueFrom:
            secretKeyRef:
              key: email
              name: myapp
        - name: ENVIRONMENT
          valueFrom:
            secretKeyRef:
              key: environment
              name: myapp
        - name: LOCK_HOSTNAME
          valueFrom:
            secretKeyRef:
              key: hostname
              name: locks
        - name: LOCK_USERNAME
          valueFrom:
            secretKeyRef:
              key: username
              name: locks
        - name: LOCK_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: locks
        - name: LOCK_DATABASE
          valueFrom:
            secretKeyRef:
              key: database
              name: locks
        - name: LOG_LEVEL
          valueFrom:
            secretKeyRef:
              key: log_level
              name: myapp
        - name: PRODUCT_IMAGES_FILESYSTEM_SETTINGS
          valueFrom:
            secretKeyRef:
              key: productimagestore
              name: myapp
        - name: QUEUE_SETTINGS
          valueFrom:
            secretKeyRef:
              key: queue
              name: azure
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              key: dsn
              name: sentry
        - name: SENTRY_SAMPLE_RATE
          valueFrom:
            secretKeyRef:
              key: profiling
              name: sentry
        - name: STORAGE_SETTINGS
          valueFrom:
            secretKeyRef:
              key: storage
              name: azure
        - name: PHP_MEMORY_LIMIT
          value: 480M
        image: docker.io/myapp-cli
        livenessProbe:
          exec:
            command:
            - /app/bin/healthy.php
            - "60"
          failureThreshold: 1
          initialDelaySeconds: 30
          periodSeconds: 300
          timeoutSeconds: 30
        name: daemon
        resources:
          limits:
            memory: 500Mi
          requests:
            memory: "0"
      nodeSelector:
        type: user
      priorityClassName: myapp-priority-scheduler
      restartPolicy: Always
      serviceAccountName: aks-cluster-identity
      terminationGracePeriodSeconds: 300
      tolerations:
      - effect: NoSchedule
        key: environment
        operator: Equal
        value: production
status: {}
---
