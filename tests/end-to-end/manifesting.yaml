  - name: "low-storage"
    template: "daemon"
    vars:
      Program: "storage"
      Priority: "low"
      Snitch: "xxxddd9e6a"
      CPU: 200
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 50
        MessagesPerPod: 100

  - name: "medium-storage"
    template: "daemon"
    vars:
      Program: "storage"
      Priority: "medium"
      Snitch: "xxx73d067c"
      CPU: 200
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 50
        MessagesPerPod: 100

  - name: "high-storage"
    template: "daemon"
    vars:
      Program: "storage"
      Priority: "high"
      Snitch: "xxx59939ee"
      CPU: 200
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 10
        MessagesPerPod: 100

  - name: "memory-storage"
    template: "daemon"
    vars:
      Program: "storage"
      Priority: "memory"
      Snitch: "xxx063aea4"
      CPU: 200
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 1
        MessagesPerPod: 100

  - name: "low-serializer"
    template: "daemon"
    vars:
      Program: "serializer"
      Priority: "low"
      Snitch: "xxxe29bf60"
      CPU: 1000
      Memory: { Request: 1000, Limit: 1000 }
      ScaleSettings:
        MinimumPods: 10
        MessagesPerPod: 10
        DatabaseRequests: 8

  - name: "medium-serializer"
    template: "daemon"
    vars:
      Program: "serializer"
      Priority: "medium"
      Snitch: "xxx516c08b"
      CPU: 1000
      Memory: { Request: 1000, Limit: 1000 }
      ScaleSettings:
        MinimumPods: 10
        MessagesPerPod: 10
        DatabaseRequests: 8

  - name: "high-serializer"
    template: "daemon"
    vars:
      Program: "serializer"
      Priority: "high"
      Snitch: "xxxa3b2e51"
      CPU: 1000
      Memory: { Request: 1000, Limit: 1000 }
      ScaleSettings:
        MinimumPods: 5
        MessagesPerPod: 10
        DatabaseRequests: 8

  - name: "memory-serializer"
    template: "daemon"
    vars:
      Program: "serializer"
      Priority: "memory"
      Snitch: "xxx1768732"
      CPU: 1000
      Memory: { Request: 5000, Limit: { production: 5000, nonprod: 1000 } }
      ScaleSettings:
        MinimumPods: 1
        MessagesPerPod: 10
        DatabaseRequests: 8

  - name: "low-outbound"
    template: "daemon"
    vars:
      Program: "outbound"
      Priority: "low"
      Snitch: "xxx48e78eb"
      Memory: { Request: 500, Limit: 500 }
      ScaleSettings:
        MinimumPods: 50
        MessagesPerPod: 10

  - name: "medium-outbound"
    template: "daemon"
    vars:
      Program: "outbound"
      Priority: "medium"
      Snitch: "xxx46fd6cd"
      Memory: { Request: 500, Limit: 500 }
      ScaleSettings:
        MinimumPods: 50
        MessagesPerPod: 10

  - name: "high-outbound"
    template: "daemon"
    vars:
      Program: "outbound"
      Priority: "high"
      Snitch: "xxx808f3b0"
      Memory: { Request: 500, Limit: 500 }
      ScaleSettings:
        MinimumPods: 10
        MessagesPerPod: 100

  - name: "memory-outbound"
    template: "daemon"
    vars:
      Program: "outbound"
      Priority: "memory"
      Snitch: "xxx8141fec"
      Memory: { Request: 1000, Limit: 1000 }
      ScaleSettings:
        MinimumPods: 1
        MessagesPerPod: 10

  - name: "cleanup-integrations"
    template: "background"
    vars:
      Program: "cleanup-integrations"
      Snitch: "xxx3336570"
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 5
        MessagesPerPod: 1
        DatabaseRequests: 8

  - name: "dismiss-duplicate-messages"
    template: "background"
    vars:
      Program: "dismiss-duplicate-messages"
      Snitch: "xxx2697c50"
      CPU: 200
      Memory: { Request: 50, Limit: 50 }
      ScaleSettings:
        MinimumPods: 1
        MessagesPerPod: 1000
        DatabaseRequests: 8

  - name: "web"
    template: "web"

  - name: "fpm"
    template: "fpm"

  - name: "autoscaler"
    template: "autoscaler"

  - name: "cleanup-invoices"
    template: "task"
    vars:
      Command: "data-structures:cleanup-invoices"
      Schedule: "0 3 * * *"

  - name: "delayed-integrations"
    template: "task"
    vars:
      Command: "integrations:utilities:delayed-integration-alert"
      Schedule: "*/5 * * * *"

  - name: "dismiss-old-messages"
    template: "task"
    vars:
      Command: "file-station:dismiss-old-messages"
      Schedule: "0 1 * * *"

  - name: "generate-image-urls"
    template: "task"
    vars:
      Command: "products:generate-image-urls"
      Schedule: "0 0 * * *"

  - name: "redact-data"
    template: "task"
    vars:
      Command: "data-structures:redact-data"
      Schedule: "30 0 * * *"

  - name: "remote-health-check"
    template: "task"
    vars:
      Command: "integrations:utilities:remote-health-check"
      Schedule: "*/5 * * * *"

  - name: "send-notifications"
    template: "task"
    vars:
      Command: "file-station:send-notifications"
      Schedule: "40 * * * *"

  - name: "send-stuck-emails"
    template: "task"
    vars:
      Command: "file-station:send-stuck-emails"
      Schedule: "0 8-18 * * 1-5"

  - name: "send-summary-emails"
    template: "task"
    vars:
      Command: "file-station:send-summary-emails"
      Schedule: "0 8 * * *"

  - name: "auto-shutdown"
    template: "task"
    environments: [ "nonprod" ]
    vars:
      Command: "system:stop"
      Schedule: "0 19 * * *"
