environments:
  - name: "production"
    output: ".generated/production.yaml"
    envFrom: "templates/envvars.yaml"
  - name: "nonprod"
    output: ".generated/nonprod.yaml"
    envFrom: "templates/envvars.yaml"

vars:
  Priority: "core"
  CPU: 50

resources:

  - name: "scheduler"
    template: "daemon"
    vars:
      Program: "scheduler"
      Priority: "scheduler"
      CPU: 500
      Memory: { Request: 50, Limit: 500 }
      Snitch: "x434d80248"
      ScaleSettings:
        MinimumPods: 1
        MessagesPerPod: 1000

  - name: "generic"
    template: "daemon"
    vars:
      Program: "generic"
      Snitch: "xdb7c333f0"
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 5
        MessagesPerPod: 1000

  - name: "low-inbound"
    template: "daemon"
    vars:
      Program: "inbound"
      Priority: "low"
      Snitch: "xxx88d4402"
      CPU: 400
      Memory: { Request: 1000, Limit: 1000 }
      ScaleSettings:
        MinimumPods: 10
        MessagesPerPod: 10

  - name: "medium-inbound"
    template: "daemon"
    vars:
      Program: "inbound"
      Priority: "medium"
      Snitch: "xxx89a7c02"
      CPU: 400
      Memory: { Request: 1000, Limit: 1000 }
      ScaleSettings:
        MinimumPods: 10
        MessagesPerPod: 10

  - name: "high-inbound"
    template: "daemon"
    vars:
      Program: "inbound"
      Priority: "high"
      Snitch: "xxxa4b8a83"
      CPU: 400
      Memory: { Request: 1000, Limit: 1000 }
      ScaleSettings:
        MinimumPods: 10
        MessagesPerPod: 1

  - name: "memory-inbound"
    template: "daemon"
    vars:
      Program: "inbound"
      Priority: "memory"
      Snitch: "xxx666e76c"
      CPU: 400
      Memory: { Request: 5000, Limit: { production: 5000, nonprod: 1000 } }
      ScaleSettings:
        MinimumPods: 1
        MessagesPerPod: 10

  - name: "low-parser"
    template: "daemon"
    vars:
      Program: "parser"
      Priority: "low"
      Snitch: "xxx2674260"
      CPU: 300
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 50
        MessagesPerPod: 10

  - name: "medium-parser"
    template: "daemon"
    vars:
      Program: "parser"
      Priority: "medium"
      Snitch: "xxx3a48574"
      CPU: 300
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 50
        MessagesPerPod: 10

  - name: "high-parser"
    template: "daemon"
    vars:
      Program: "parser"
      Priority: "high"
      Snitch: "xxxb9c3871"
      CPU: 300
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 10
        MessagesPerPod: 100

  - name: "memory-parser"
    template: "daemon"
    vars:
      Program: "parser"
      Priority: "memory"
      Snitch: "xxx6f386c4"
      CPU: 300
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 1
        MessagesPerPod: 10

  - name: "low-validator"
    template: "daemon"
    vars:
      Program: "validator"
      Priority: "low"
      Snitch: "xxx6be36e8"
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 100
        MessagesPerPod: 50

  - name: "medium-validator"
    template: "daemon"
    vars:
      Program: "validator"
      Priority: "medium"
      Snitch: "xxx722df88"
      Memory: { Request: 50, Limit: 500 }
      ScaleSettings:
        MinimumPods: 100
        MessagesPerPod: 50

  - name: "high-validator"
    template: "daemon"
    vars:
      Program: "validator"
      Priority: "high"
      Snitch: "xxx19b07be"
